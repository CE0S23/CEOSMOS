<main class="login-page">
  <div class="cosmos-bg" aria-hidden="true">
    <div class="star star-1"></div>
    <div class="star star-2"></div>
    <div class="star star-3"></div>
    <div class="nebula"></div>
  </div>

  <section class="login-card glassmorphism">
    <div class="brand-section">
      <span class="brand-mark">✦</span>
      <h1 class="brand-title">Recuperar contraseña</h1>
      <p class="brand-tagline">Te enviaremos un correo con las instrucciones</p>
    </div>

    @if (isLoading()) {
      <div class="loading-state">
        <p-progressSpinner strokeWidth="3" styleClass="custom-spinner" />
        <span>Enviando...</span>
      </div>
    } @else {
      <div class="auth-options">
        <form [formGroup]="forgotForm" (ngSubmit)="requestReset()" class="form-section">
          <div class="field">
            <input pInputText id="email" formControlName="email" type="email" placeholder="Correo electrónico" style="width: 100%" />
          </div>

          <button pButton type="submit" label="Enviar código" [disabled]="forgotForm.invalid || successMessage()" class="login-submit-btn" style="width: 100%; margin-top: 15px;"></button>

          <div class="auth-links">
            <br />
            <a routerLink="/login" class="auth-link">Volver al inicio de sesión</a>
          </div>
        </form>

        @if (errorMessage()) {
          <p class="error-msg">{{ errorMessage() }}</p>
        }
        @if (successMessage()) {
          <p class="success-msg" style="color: #4ade80; text-align: center; font-size: 0.85rem;">{{ successMessage() }}</p>
        }
      </div>
    }
  </section>
</main>
