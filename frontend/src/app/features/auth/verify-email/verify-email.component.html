<main class="login-page">
  <div class="cosmos-bg" aria-hidden="true">
    <div class="star star-1"></div>
    <div class="star star-2"></div>
    <div class="star star-3"></div>
    <div class="nebula"></div>
  </div>

  <section class="login-card glassmorphism">
    <div class="brand-section">
      <span class="brand-mark">✦</span>
      <h1 class="brand-title">Verifica tu cuenta</h1>
      <p class="brand-tagline">Enviamos un código a {{ email }}</p>
      <p class="brand-tagline" style="font-size: 0.8rem; margin-top: 0;">Revisa también tu carpeta de Spam</p>
    </div>

    @if (isLoading()) {
      <div class="loading-state">
        <p-progressSpinner strokeWidth="3" styleClass="custom-spinner" />
        <span>Verificando...</span>
      </div>
    } @else {
      <div class="auth-options">
        <form [formGroup]="verifyForm" (ngSubmit)="verify()" class="form-section">
          <div class="field" style="text-align: center;">
            <input pInputText id="code" formControlName="code" type="text" placeholder="Código de 6 caracteres" style="width: 100%; text-align: center; letter-spacing: 2px; font-weight: bold; font-size: 1.2rem;" maxlength="6" />
          </div>

          <button pButton type="submit" label="Verificar cuenta" [disabled]="verifyForm.invalid" class="login-submit-btn" style="width: 100%;"></button>

          <div class="auth-links">
            <br />
            <button pButton type="button" class="p-button-text p-button-sm p-button-secondary" (click)="resendCode()" [disabled]="cooldown() > 0" style="padding: 0; width: 100%;">
              {{ cooldown() > 0 ? 'Espera ' + cooldown() + 's para reenviar' : '¿No recibiste nada? Reenviar código' }}
            </button>
          </div>
        </form>

        @if (errorMessage()) {
          <p class="error-msg">{{ errorMessage() }}</p>
        }
        @if (successMessage()) {
          <p class="success-msg" style="color: #4ade80; text-align: center; font-size: 0.85rem;">{{ successMessage() }}</p>
        }
      </div>
    }
  </section>
</main>
